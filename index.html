<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3MU VAULT | Premium Minecraft Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { 
            --bg: #050505; 
            --accent: #8147ff; 
            --card-bg: #0d0d0d; 
            --text: #eee; 
            --border: #1a1a1a; 
            --yt: #FF0000; 
            --dc: #5865F2; 
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }
       
        #particles-js { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            pointer-events: none; 
        }
        #content-wrapper, #detailPage { 
            position: relative; 
            z-index: 2; 
        }
        .nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 5%; 
            background: rgba(5,5,5,0.95); 
            backdrop-filter: blur(15px); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid var(--border); 
        }
        .nav-logo { 
            font-weight: 900; 
            font-size: 1.7rem; 
            color: #fff; 
            letter-spacing: -1.5px; 
        }
        .nav-links { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
       
        .cheat-counter { 
            display: flex; 
            align-items: center; 
            color: #fff; 
            font-weight: 700; 
            font-size: 13px; 
            margin-right: 10px; 
            border: 1px solid rgba(129,71,255,0.3); 
            padding: 5px 12px; 
            border-radius: 9999px; 
            background: rgba(129,71,255,0.08); 
        }
        .live-dot { 
            width: 7px; 
            height: 7px; 
            background: var(--accent); 
            border-radius: 50%; 
            margin-right: 8px; 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(129,71,255,0.7); } 
            70% { box-shadow: 0 0 0 8px rgba(129,71,255,0); } 
            100% { box-shadow: 0 0 0 0 rgba(129,71,255,0); } 
        }
        .hero { 
            padding: 70px 20px 30px; 
            text-align: center; 
        }
        .hero-title { 
            font-size: 3.2rem; 
            font-weight: 900; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: -2px; 
        }
        .hero-sub { 
            color: #888; 
            font-size: 1.1rem; 
            margin: 12px 0 35px; 
            font-weight: 600; 
        }
        .search-bar { 
            width: 90%; 
            max-width: 620px; 
            padding: 16px 24px; 
            background: rgba(15,15,15,0.95); 
            border: 1px solid var(--border); 
            border-radius: 9999px; 
            color: white; 
            font-size: 1rem; 
            outline: none; 
            margin-bottom: 40px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            transition: all 0.3s ease; 
        }
        .search-bar:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px rgba(129, 71, 255, 0.3); 
            transform: scale(1.02); 
        }
        .tabs { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin-bottom: 40px; 
        }
        .tab { 
            padding: 12px 22px; 
            background: #111; 
            border-radius: 9999px; 
            font-weight: 700; 
            color: #666; 
            cursor: pointer; 
            border: 1px solid var(--border); 
            transition: all 0.3s ease; 
            font-size: 0.9rem; 
        }
        .tab:hover { 
            background: #1f1f1f; 
            color: #fff; 
            transform: translateY(-2px); 
        }
        .tab.active { 
            background: var(--accent); 
            color: white; 
            border-color: var(--accent); 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 20px 80px; 
        }
        .card { 
            background: rgba(13,13,13,0.85); 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            padding: 14px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            overflow: hidden; 
        }
        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent); 
            box-shadow: 0 15px 35px rgba(129,71,255,0.15); 
        }
        .card img { 
            width: 100%; 
            border-radius: 12px; 
            height: 140px; 
            object-fit: cover; 
            margin-bottom: 12px; 
        }
        .card .cat-badge { 
            color: var(--accent); 
            font-weight: 800; 
            font-size: 10px; 
            letter-spacing: 1px; 
        }
        .card h3 { 
            font-size: 1.1rem; 
            margin: 8px 0 4px; 
            font-weight: 700; 
        }
        .card p { 
            font-size: 0.85rem; 
            color: #777; 
            margin: 0; 
            line-height: 1.3; 
        }

        /* DETAIL PAGE - PROFESSIONAL LOOK */
        #detailPage {
            min-height: 100vh;
            background: var(--bg);
        }
        .detail-hero {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
            align-items: flex-start;
        }
        .detail-main-img-container {
            flex: 1;
            min-width: 320px;
        }
        .detail-main-img-container img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }
        .detail-main-img-container img:hover {
            transform: scale(1.03);
        }
        .detail-info-header {
            flex: 1;
            min-width: 320px;
        }
        .detail-info-header .cat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(129,71,255,0.15);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .detail-info-header h1 {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 12px;
        }
        .detail-info-header p {
            font-size: 1.15rem;
            color: #aaa;
            margin: 0;
        }

        .detail-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 80px;
        }
        .detail-section {
            margin-bottom: 50px;
        }
        .section-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 18px;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 30px;
        }
        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .screenshots-grid img {
            width: 100%;
            border-radius: 12px;
            cursor: zoom-in;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .screenshots-grid img:hover {
            transform: scale(1.04);
            box-shadow: 0 10px 25px rgba(129,71,255,0.2);
        }
        .dl-btn { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 16px 20px; 
            background: #151515; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            margin-bottom: 12px; 
            border: 1px solid #222; 
            font-size: 1rem; 
            transition: all 0.3s ease; 
        }
        .dl-btn:hover { 
            background: var(--accent); 
            transform: translateY(-2px);
        }
        .keybind-list {
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        #modal { display: none; }
        #zoomOverlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.98); 
            z-index: 2000; 
            justify-content: center; 
            align-items: center; 
        }
        #zoomImg { 
            max-width: 92%; 
            max-height: 92%; 
            border-radius: 16px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* ADMIN PANEL - NEW PROFESSIONAL VERSION */
        #nimdoArea { 
            display: none; 
            padding: 40px 20px; 
            min-height: 100vh; 
            background: #050505; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            z-index: 5000; 
            overflow-y: auto; 
        }
        .nimdo-card { 
            background: #0d0d0d; 
            max-width: 620px; 
            margin: 0 auto; 
            padding: 35px; 
            border-radius: 20px; 
            border: 2px solid var(--accent); 
            box-shadow: 0 0 40px rgba(129,71,255,0.3);
        }
        .nimdo-in { 
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 14px; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        .row-flex {
            display: flex; 
            gap: 10px; 
            margin-bottom: 12px; 
            align-items: center;
        }
        .admin-label {
            font-weight: 600;
            color: #ccc;
            margin: 20px 0 8px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="adminTrigger" onclick="checkAdmin()"></div>
