<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3MU VAULT | Premium Minecraft Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #8147ff; --card-bg: #0d0d0d; --text: #eee; --border: #1a1a1a; --yt: #FF0000; --dc: #5865F2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #content-wrapper { position: relative; z-index: 2; }

        .nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .nav-logo { font-weight: 700; font-size: 1.7rem; text-transform: uppercase; color: #fff; }

        .hero { padding: 80px 20px 20px; text-align: center; }
        .hero-title { font-size: 2.8rem; font-weight: 900; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .hero-sub { color: #888; font-size: 1rem; margin: 12px 0 40px; font-weight: 600; }

        .search-bar { width: 100%; max-width: 650px; padding: 18px 25px; background: rgba(15,15,15,0.9); border: 1px solid var(--border); border-radius: 15px; color: white; font-size: 1rem; outline: none; margin-bottom: 50px; }

        .tabs { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px; }
        .tab { padding: 10px 20px; background: #111; border-radius: 10px; font-weight: 800; color: #555; cursor: pointer; border: 1px solid var(--border); font-size: 12px; }
        .tab.active { background: var(--accent); color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }
        .card { background: rgba(13,13,13,0.8); border-radius: 20px; border: 1px solid var(--border); padding: 22px; transition: 0.4s; cursor: pointer; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .card img { width: 100%; border-radius: 14px; height: 180px; object-fit: cover; margin-bottom: 18px; }

        /* Modal Styles with Image */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .m-content { background: #0a0a0a; padding: 30px; border-radius: 25px; max-width: 500px; width: 100%; border: 1px solid #222; text-align: center; }
        .m-img { width: 100%; border-radius: 15px; margin-bottom: 20px; height: 200px; object-fit: cover; border: 1px solid #1a1a1a; }
        .dl-btn { display: flex; justify-content: space-between; align-items: center; background: #151515; color: white; padding: 15px 20px; border-radius: 12px; text-decoration: none; font-weight: 800; margin-top: 10px; border: 1px solid #222; }
        .dl-btn:hover { background: var(--accent); }

        #nimdoArea { display: none; padding: 60px 20px; max-width: 800px; margin: 0 auto; }
        .nimdo-card { background: #0f0f0f; padding: 40px; border-radius: 30px; border: 2px dashed var(--accent); }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div id="content-wrapper">
        <nav class="nav">
            <div class="nav-logo">ʀ3ᴍᴜ ᴠᴀᴜʟᴛ</div>
            <div class="nav-links">
                <a href="https://youtube.com/@r3mu" target="_blank" style="color:var(--yt); margin-right:15px;"><i class="fab fa-youtube"></i></a>
                <a href="https://discord.gg/r3mu" target="_blank" style="color:var(--dc);"><i class="fab fa-discord"></i></a>
            </div>
        </nav>

        <div id="vaultContent">
            <div class="hero">
                <h1 class="hero-title">PREMIUM VAULT</h1>
                <p class="hero-sub">The ultimate archive. Crafted for eliteness.</p>
                <input type="text" id="searchBar" class="search-bar" placeholder="Search..." onkeyup="search()">
            </div>

            <div class="tabs">
                <div class="tab active" onclick="filter('all', this)">ALL</div>
                <div class="tab" onclick="filter('shop', this)" style="color: gold;">💰 SHOP</div>
            </div>

            <div class="grid" id="mainGrid">
                <div class="card" data-cat="shop" onclick="openItem('CustomClient','https://media.discordapp.net/attachments/1485819883538354206/1485932090649219072/image.png','ALL Versions','https://discord.gg/aFnv9JMX5Y','shop','T3JkZXIgeW91ciBjdXN0b20gYnVpbHQgY2xpZW50IGZvciBtYXhpbXVtIHBlcmZvcm1hbmNl')">
                    <img src="https://media.discordapp.net/attachments/1485819883538354206/1485932090649219072/image.png">
                    <div style="color:var(--accent); font-weight:900; font-size:11px;">SHOP</div>
                    <h3>CustomClient</h3>
                    <p>Order your custom built client...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" onclick="closeM(event)">
        <div class="m-content" onclick="event.stopPropagation()">
            <img id="mImg" class="m-img" src="">
            <h2 id="mTitle" style="font-size:28px; margin:0; font-weight:900;"></h2>
            <p id="mDesc" style="color:#888; margin:15px 0; font-weight:600;"></p>
            <div id="mLinks"></div>
        </div>
    </div>

    <script>
        particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "color": { "value": "#8147ff" }, "line_linked": { "enable": true, "color": "#8147ff", "opacity": 0.2 }, "move": { "speed": 2 } } });

        function search() {
            let q = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
        }

        function filter(cat, el) {
            document.querySelectorAll('.card').forEach(c => c.style.display = (cat === 'all' || c.dataset.cat === cat) ? "block" : "none");
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        // Fixed openItem Function
        function openItem(name, img, versions, links, cat, descB64) {
            document.getElementById('mTitle').innerText = name;
            document.getElementById('mImg').src = img; // Setting the image
            document.getElementById('mDesc').innerText = descB64 ? atob(descB64) : "Contact on Discord.";
            
            let vArr = versions.split('|'), lArr = links.split('|'), h = '';
            vArr.forEach((v, i) => { h += `<a href="${lArr[i]}" class="dl-btn" target="_blank"><span>${v}</span> <i class="fas fa-download"></i></a>`; });
            document.getElementById('mLinks').innerHTML = h;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeM(e) { if(!e || e.target.id === 'modal') document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
