<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3MU VAULT | Official Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #8147ff; --card-bg: #0f0f0f; --text: #eee; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        
        /* Vault UI */
        #vaultContent { padding: 40px 20px; max-width: 1300px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 15px; border: 1px solid #1a1a1a; overflow: hidden; padding: 20px; cursor: pointer; }
        
        /* Admin Manager (Image 12 Update) */
        #adminArea { display: none; padding: 30px; background: #0a0a0a; border-radius: 15px; border: 1px dashed var(--accent); max-width: 800px; margin: 50px auto; }
        .adm-title { color: var(--accent); font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }
        .adm-in { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; color: white; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
        .v-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .add-v-btn { background: #222; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; width: 100%; font-weight: bold; }
        .adm-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="vaultContent">
        <h1 style="text-align:center; font-size: 3rem; font-weight: 900;">ʀ3ᴍᴜ ᴠᴀᴜʟᴛ</h1>
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="adminArea">
        <div class="adm-title">Vault Manager</div>
        <select id="aCat" class="adm-in">
            <option value="clients">Clients</option>
            <option value="mods">Mods / Macros</option>
            <option value="shop">Shop</option>
        </select>
        <input type="text" id="aName" class="adm-in" placeholder="Item Name">
        <input type="text" id="aImg" class="adm-in" placeholder="Image URL">
        <textarea id="aDesc" class="adm-in" placeholder="Item Description (What does it do?)" style="height:80px;"></textarea>
        
        <div id="versionContainer">
            <div class="v-row">
                <input type="text" class="adm-in v-num" placeholder="Version (e.g. 1.21)">
                <input type="text" class="adm-in v-link" placeholder="Download Link">
            </div>
        </div>
        <button class="add-v-btn" onclick="addVField()">+ Add Another Version</button>
        
        <button class="adm-btn" onclick="gen()">GENERATE & COPY CODE</button>
        <textarea id="aOut" class="adm-in" style="margin-top:20px; height:100px; display:none;"></textarea>
    </div>

    <script>
        // Check for Secret URL Access (?admin=true)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'true') {
            // "Ulta Seedha" Password Logic (Base64 + Rot13 style check)
            let p = prompt("Security Key:");
            if (btoa(p) === "cG9va2llMTIz") { // pookie123 encoded
                document.getElementById('adminArea').style.display = 'block';
                document.getElementById('vaultContent').style.display = 'none';
            } else {
                alert("Unauthorized Access!");
                window.location.href = window.location.pathname;
            }
        }

        function addVField() {
            const div = document.createElement('div');
            div.className = 'v-row';
            div.innerHTML = `<input type="text" class="adm-in v-num" placeholder="Version"><input type="text" class="adm-in v-link" placeholder="Download Link">`;
            document.getElementById('versionContainer').appendChild(div);
        }

        function gen() {
            const n = document.getElementById('aName').value;
            const c = document.getElementById('aCat').value;
            const i = document.getElementById('aImg').value;
            const d = document.getElementById('aDesc').value;
            
            let vNums = Array.from(document.getElementsByClassName('v-num')).map(el => el.value).join(',');
            let vLinks = Array.from(document.getElementsByClassName('v-link')).map(el => el.value).join(',');

            const code = `
            <div class="card" data-cat="${c}" onclick="openDL('${n}','${i}','${vNums}','${vLinks}','${c}','${btoa(d)}')">
                <img src="${i}" style="width:100%; border-radius:10px;">
                <h3 class="card-name">${n}</h3>
                <p style="font-size:12px; color:#888;">${d.substring(0,50)}...</p>
            </div>`;
            
            navigator.clipboard.writeText(code);
            alert("Code Generated & Copied!");
        }
    </script>
</body>
</html>
