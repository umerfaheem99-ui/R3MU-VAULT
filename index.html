<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3MU VAULT | Premium Minecraft Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --accent: #8147ff; --card-bg: #0d0d0d; --text: #eee; --border: #1a1a1a; --yt: #FF0000; --dc: #5865F2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; letter-spacing: -0.2px; }
        
        /* Navbar with normal smooth bold logo */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .nav-logo { font-weight: 700; font-size: 1.7rem; letter-spacing: -1.2px; text-transform: uppercase; color: #fff; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { font-size: 1.4rem; transition: 0.3s; }
        .fa-youtube { color: var(--yt); }
        .fa-discord { color: var(--dc); }
        .nav-links a:hover { transform: scale(1.15); filter: brightness(1.2); }

        /* ADVANCED: Full Hero Section with bold Title */
        .hero { padding: 90px 20px 20px; text-align: center; }
        .hero-title { font-size: 4.8rem; font-weight: 900; margin: 0; letter-spacing: -3px; text-transform: uppercase; line-height: 1; }
        .hero-accent { color: var(--accent); }
        .hero-sub { color: #888; font-size: 1.2rem; margin: 15px 0 50px; font-weight: 600;}

        /* Search bar (Fixed and styled like Cyde.xyz) */
        .search-container { max-width: 700px; margin: 0 auto 50px; position: relative; }
        .search-bar { width: 100%; padding: 20px 30px; background: #0f0f0f; border: 1px solid var(--border); border-radius: 18px; color: white; font-size: 1.1rem; outline: none; transition: 0.3s; box-sizing: border-box; font-weight: 600; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 30px rgba(129,71,255,0.15); }

        /* Categories */
        .tabs { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px; padding: 0 20px; }
        .tab { padding: 12px 24px; background: #111; border-radius: 12px; font-weight: 800; color: #555; cursor: pointer; transition: 0.3s; font-size: 13px; text-transform: uppercase; border: 1px solid var(--border); }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 8px 20px rgba(129,71,255,0.3); }
        .tab:hover:not(.active) { color: #aaa; border-color: #333; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; max-width: 1300px; margin: 0 auto; padding: 0 30px 100px; }
        .card { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); padding: 25px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card img { width: 100%; border-radius: 16px; height: 190px; object-fit: cover; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .card-cat { color: var(--accent); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .card h3 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        .card p { font-size: 14px; color: #888; margin-top: 10px; line-height: 1.6; }

        /* Modal Popup */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .m-content { background: #0a0a0a; padding: 40px; border-radius: 30px; max-width: 550px; width: 100%; border: 1px solid #222; position: relative; }
        .m-close { position: absolute; top: 20px; right: 25px; font-size: 30px; color: #444; cursor: pointer; }
        .dl-btn { display: flex; justify-content: space-between; align-items: center; background: #151515; color: white; padding: 18px 25px; border-radius: 15px; text-decoration: none; font-weight: 800; margin-top: 12px; border: 1px solid #222; transition: 0.3s; }
        .dl-btn:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.02); }

        /* Admin Panel Styles */
        #nimdoArea { display: none; padding: 60px 20px; max-width: 800px; margin: 0 auto; }
        .nimdo-card { background: #0f0f0f; padding: 40px; border-radius: 30px; border: 2px dashed var(--accent); }
        .nimdo-in { width: 100%; padding: 16px; margin-bottom: 15px; background: #000; color: white; border: 1px solid #222; border-radius: 12px; box-sizing: border-box; font-family: inherit; font-weight: 600; }
        .v-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-v { background: var(--accent); color: white; border: none; width: 50px; border-radius: 10px; cursor: pointer; font-size: 20px; font-weight: 900; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-logo">ʀ3ᴍᴜ ᴠᴀᴜʟᴛ</div>
        <div class="nav-links">
            <a href="https://youtube.com/@r3mu" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://discord.gg/r3mu" target="_blank"><i class="fab fa-discord"></i></a>
        </div>
    </nav>

    <div id="vaultContent">
        <div class="hero">
            <h1 class="hero-title">ʀ3ᴍᴜ PREMIUM VAULT</h1>
            <p class="hero-sub">The ultimate archive. Crafted for eliteness.</p>
            
            <div class="search-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="Search for clients, mods, or sources..." onkeyup="search()">
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="filter('all', this)">ALL</div>
            <div class="tab" onclick="filter('clients', this)">CLIENTS</div>
            <div class="tab" onclick="filter('mods', this)">MODS / MACROS</div>
            <div class="tab" onclick="filter('pvp', this)">PVP OPTIMIZERS</div>
            <div class="tab" onclick="filter('source', this)">SOURCE CODES</div>
            <div class="tab" onclick="filter('bypass', this)">BYPASSES</div>
            <div class="tab" onclick="filter('shop', this)" style="color: gold; border-color: #443300;">💰 SHOP</div>
        </div>

        <div class="grid" id="mainGrid">
            <div class="card" data-cat="shop" onclick="openItem('Custom Client Build','https://media.discordapp.net/attachments/1485819883538354206/1485932090649219072/image.png','Order Now','https://discord.gg/r3mu','Shop','Q3VzdG9tIEJ1aWx0IC0gMyBEYXkgV2FycmFudHkgLSBGaXhlcyBJbmNsdWRlZA==')">
                <img src="https://media.discordapp.net/attachments/1485819883538354206/1485932090649219072/image.png">
                <div class="card-cat">Shop</div>
                <h3>Custom Client Build</h3>
                <p>Per Module: $1 | Mod Analyzer Bypass: $4...</p>
            </div>
        </div>
    </div>

    <div id="modal" onclick="closeM(event)">
        <div class="m-content" onclick="event.stopPropagation()">
            <span class="m-close" onclick="closeM(null)">&times;</span>
            <h2 id="mTitle" style="font-size:36px; margin:0; font-weight:900;"></h2>
            <p id="mDesc" style="color:#888; margin:25px 0; font-size:16px; font-weight:600;"></p>
            <div id="mLinks"></div>
        </div>
    </div>

    <div id="nimdoArea">
        <div class="nimdo-card">
            <h1 style="color:var(--accent); font-weight:900; margin-top:0;">NIMDO CONSOLE</h1>
            <select id="nCat" class="nimdo-in">
                <option value="clients">Clients</option>
                <option value="mods">Mods / Macros</option>
                <option value="pvp">PvP Optimizers</option>
                <option value="source">Source Codes</option>
                <option value="bypass">Bypasses</option>
                <option value="shop">Shop</option>
            </select>
            <input type="text" id="nName" class="nimdo-in" placeholder="Item Name">
            <input type="text" id="nImg" class="nimdo-in" placeholder="Image URL">
            <textarea id="nDesc" class="nimdo-in" placeholder="Description" style="height:100px;"></textarea>
            <div id="vList">
                <div class="v-row">
                    <input type="text" class="nimdo-in v-num" placeholder="Version (e.g. ALL)" style="margin:0;">
                    <input type="text" class="nimdo-in v-link" placeholder="Order Link" style="margin:0;">
                    <button class="btn-v" onclick="addV()">+</button>
                </div>
            </div>
            <button onclick="genItem()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:900; cursor:pointer; margin-top:10px; font-size:1rem;">GENERATE & COPY CODE</button>
        </div>
    </div>

    <script>
        // NIMDO Access
        if (window.location.search.includes('nimda')) {
            if (prompt("NIMDO Key:") === "pookie123") {
                document.getElementById('nimdoArea').style.display = 'block';
                document.getElementById('vaultContent').style.display = 'none';
                document.querySelector('.nav').style.display = 'none';
            }
        }

        function addV() {
            const row = document.createElement('div');
            row.className = 'v-row';
            row.innerHTML = `<input type="text" class="nimdo-in v-num" style="margin:0;"><input type="text" class="nimdo-in v-link" style="margin:0;"><button class="btn-v" style="background:#ff4747;" onclick="this.parentElement.remove()">-</button>`;
            document.getElementById('vList').appendChild(row);
        }

        function search() {
            let q = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
            });
        }

        function filter(cat, el) {
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = (cat === 'all' || c.dataset.cat === cat) ? "block" : "none";
            });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function openItem(name, img, versions, links, cat, descB64) {
            document.getElementById('mTitle').innerText = name;
            document.getElementById('mDesc').innerText = atob(descB64);
            let vArr = versions.split('|'), lArr = links.split('|'), h = '';
            vArr.forEach((v, i) => {
                h += `<a href="${lArr[i]}" class="dl-btn" target="_blank"><span>${v}</span> <i class="fas fa-chevron-right"></i></a>`;
            });
            document.getElementById('mLinks').innerHTML = h;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeM(e) { if(!e || e.target.id === 'modal' || e.target.className === 'm-close') document.getElementById('modal').style.display = 'none'; }

        function genItem() {
            const n = document.getElementById('nName').value, c = document.getElementById('nCat').value, i = document.getElementById('nImg').value, d = document.getElementById('nDesc').value;
            const v = Array.from(document.querySelectorAll('.v-num')).map(e => e.value).join('|');
            const l = Array.from(document.querySelectorAll('.v-link')).map(e => e.value).join('|');
            const code = `<div class="card" data-cat="${c}" onclick="openItem('${n}','${i}','${v}','${l}','${c}','${btoa(d)}')"><img src="${i}"><div class="card-cat">${c}</div><h3>${n}</h3><p>${d.substring(0,50)}...</p></div>`;
            navigator.clipboard.writeText(code);
            alert("Card Code Copied! Now paste it into the main grid.");
        }
    </script>
</body>
</html>
