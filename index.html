<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R3MU VAULT | Premium Minecraft Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<style>
:root {
  --bg: #060608;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --card-bg: #0e0e12;
  --text: #e8e8f0;
  --muted: #5a5a72;
  --border: #1c1c28;
  --yt: #FF0000;
  --dc: #5865F2;
  --grad: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
  font-size: 14px;
}
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}
#content-wrapper, #detailPage {
  position: relative;
  z-index: 2;
}
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4%;
  height: 52px;
  background: rgba(6,6,8,0.96);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 1.25rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  padding: 6px 14px;
  border: 1px solid rgba(124,58,237,0.35);
  border-radius: 8px;
  user-select: none;
}
.nav-links { display: flex; align-items: center; gap: 20px; }
.cheat-counter {
  display: flex;
  align-items: center;
  background: rgba(124,58,237,0.08);
  border: 1px solid rgba(124,58,237,0.25);
  padding: 5px 12px;
  border-radius: 100px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text);
}
.live-dot {
  width: 6px;
  height: 6px;
  background: #22c55e;
  border-radius: 50%;
  margin-right: 8px;
  box-shadow: 0 0 8px #22c55e;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}
.hero {
  padding: 50px 20px 20px;
  text-align: center;
}
.hero-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 3rem;
  font-weight: 700;
  margin: 0;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
}
.hero-sub {
  color: var(--muted);
  font-size: 0.95rem;
  margin-top: 5px;
  font-weight: 500;
}
.search-container {
  max-width: 500px;
  margin: 30px auto 40px;
  position: relative;
}
.search-bar {
  width: 100%;
  background: rgba(28,28,40,0.5);
  border: 1px solid var(--border);
  padding: 14px 20px;
  border-radius: 14px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 0.3s ease;
}
.search-bar:focus {
  border-color: var(--accent);
  background: rgba(28,28,40,0.8);
  box-shadow: 0 0 0 4px rgba(124,58,237,0.1);
}
.filter-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 30px;
  padding: 0 20px;
  overflow-x: auto;
}
.tab {
  padding: 8px 18px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s ease;
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 1px;
}
.tab.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 20px 80px;
}
.card {
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 12px;
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
}
.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 12px;
}
.card-cat {
  font-size: 9px;
  font-weight: 800;
  color: var(--accent2);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
}
.card-name {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}
.card-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ADMIN PANEL STYLE */
#nimdoArea {
  display: none;
  position: fixed;
  inset: 0;
  background: #050505;
  z-index: 5000;
  padding: 40px 20px;
  overflow-y: auto;
}
.nimdo-card {
  background: #0d0d12;
  max-width: 500px;
  margin: 0 auto;
  padding: 30px;
  border-radius: 20px;
  border: 1px solid var(--accent);
}
.nimdo-in {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: #000;
  border: 1px solid #222;
  color: #fff;
  border-radius: 8px;
}
</style>
</head>
<body>

<div id="particles-js"></div>

<div id="nimdoArea">
  <div class="nimdo-card">
    <h2 style="color:var(--accent); text-align:center; margin-top:0;">NIMDO ADMIN</h2>
    <input type="text" id="nName" class="nimdo-in" placeholder="Client Name">
    <select id="nCat" class="nimdo-in">
      <option value="clients">Clients</option>
      <option value="mods">Mods / Macros</option>
      <option value="source">Source Codes</option>
    </select>
    <input type="text" id="nImg" class="nimdo-in" placeholder="Image URL">
    <textarea id="nDesc" class="nimdo-in" placeholder="Description"></textarea>
    <button onclick="generateCode()" style="background:var(--accent); color:white; border:none; width:100%; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;">GENERATE ITEM CODE</button>
    <button onclick="location.reload()" style="background:transparent; color:#555; border:none; width:100%; margin-top:10px; cursor:pointer;">Exit</button>
  </div>
</div>

<div id="content-wrapper">
  <nav class="nav">
    <div class="nav-logo">R3MU VAULT</div>
    <div class="nav-links">
      <div class="cheat-counter"><div class="live-dot"></div>LIVE | <span id="cheatCount">0</span> ASSETS</div>
      <a href="https://discord.gg/r3musblackmarket" target="_blank" style="color:var(--dc); font-size:18px;"><i class="fab fa-discord"></i></a>
    </div>
  </nav>

  <div class="hero">
    <h1 class="hero-title">PREMIUM VAULT</h1>
    <p class="hero-sub">The ultimate archive. Crafted for eliteness.</p>
    <div class="search-container">
      <input type="text" id="searchBar" class="search-bar" placeholder="Search for clients, mods, sources..." onkeyup="doSearch()">
    </div>
  </div>

  <div class="filter-row">
    <div class="tab active" onclick="filterCat('all', this)">ALL</div>
    <div class="tab" onclick="filterCat('clients', this)">CLIENTS</div>
    <div class="tab" onclick="filterCat('mods', this)">MODS</div>
    <div class="tab" onclick="filterCat('source', this)">SOURCE</div>
  </div>

  <div class="grid" id="mainGrid"></div>
</div>

<script>
// ── PARTICLES ─────────────────────────────────
particlesJS("particles-js", {
  particles: {
    number: { value: 50 },
    color: { value: "#7c3aed" },
    opacity: { value: 0.3 },
    size: { value: 2 },
    line_linked: { enable: true, distance: 150, color: "#7c3aed", opacity: 0.1 },
    move: { speed: 1 }
  }
});

// ── DATA ──────────────────────────────────────
const items = [
  {
    "slug": "platinium-client",
    "name": "Platinium Client",
    "cat": "clients",
    "img": "https://i.postimg.cc/kXxghNs0/image.webp",
    "desc": "Minecraft OldGen CPvP Hack Client Used By Dr Donut",
    "loader": "Fabric 1.18.2\nPut It In Mods Folder",
    "keybinds": "Comma To open gui",
    "versions": [
      { "ver": "1.18.2", "link": "https://shrinkme.click/gfdyk52q" }
    ],
    "screenshots": ["https://i.postimg.cc/kXxghNs0/image.webp"]
  }
];

// ── INIT (ADMIN BY URL) ───────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  
  // Admin Check
  if (params.get('page') === 'admin') {
    if (prompt("NIMDO Password:") === "pookie123") {
      document.getElementById('nimdoArea').style.display = 'block';
      document.getElementById('content-wrapper').style.display = 'none';
    } else {
      location.replace(location.pathname);
    }
    return;
  }

  renderGrid(items);
  document.getElementById('cheatCount').innerText = items.length;
});

function renderGrid(arr) {
  const g = document.getElementById('mainGrid');
  g.innerHTML = arr.map(i => `
    <div class="card" data-cat="${i.cat}" onclick="window.open('${i.versions[0].link}', '_blank')">
      <img src="${i.img}">
      <div class="card-cat">${i.cat}</div>
      <div class="card-name">${i.name}</div>
      <div class="card-desc">${i.desc}</div>
    </div>
  `).join('');
}

function filterCat(cat, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const filtered = cat === 'all' ? items : items.filter(i => i.cat === cat);
  renderGrid(filtered);
}

function doSearch() {
  const q = document.getElementById('searchBar').value.toLowerCase();
  const filtered = items.filter(i => i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
  renderGrid(filtered);
}

function generateCode() {
  const name = document.getElementById('nName').value;
  const cat = document.getElementById('nCat').value;
  const img = document.getElementById('nImg').value;
  const desc = document.getElementById('nDesc').value;
  
  const newItem = {
    slug: name.toLowerCase().replace(/\s+/g, '-'),
    name, cat, img, desc,
    loader: "Fabric", keybinds: "Shift",
    versions: [{ ver: "1.21", link: "#" }],
    screenshots: [img]
  };
  
  console.log(`items.push(${JSON.stringify(newItem, null, 2)});`);
  alert("Code generated in Console (F12)!");
}
</script>
</body>
</html>
