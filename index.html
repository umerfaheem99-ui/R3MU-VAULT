<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3MU VAULT | Premium Minecraft Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --accent: #a855f7; 
            --card-bg: #121212; 
            --text: #e0e0e0; 
            --border: #282828; 
        }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow-x: hidden; 
        }
        #particles-js { 
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; 
            z-index: 1; pointer-events: none; opacity: 0.7;
        }

        /* NAV */
        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.98); backdrop-filter: blur(20px);
            padding: 18px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            font-size: 1.9rem; font-weight: 900; letter-spacing: -2px;
            color: #c026d3; 
        }
        .nav-right {
            display: flex; align-items: center; gap: 20px;
        }
        .live-counter {
            background: rgba(168,85,247,0.15); border: 1px solid var(--accent);
            padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; gap: 6px;
        }
        .social-icon { font-size: 1.8rem; transition: all 0.3s ease; }
        .social-icon:hover { transform: scale(1.25); }

        /* HERO */
        .hero {
            text-align: center; padding: 90px 20px 50px;
        }
        .hero-title {
            font-size: 3.8rem; font-weight: 900; margin: 0; letter-spacing: -3px;
            background: linear-gradient(90deg, #fff, #c026d3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-sub { color: #aaa; font-size: 1.2rem; margin: 12px 0 40px; }

        .search-bar {
            width: 85%; max-width: 680px; margin: 0 auto 40px;
            padding: 18px 30px; background: #1a1a1a; border: 2px solid #333;
            border-radius: 9999px; color: white; font-size: 1.05rem;
            outline: none; transition: all 0.4s;
        }
        .search-bar:focus {
            border-color: var(--accent); box-shadow: 0 0 30px rgba(168,85,247,0.4);
        }

        /* TABS & FILTERS */
        .filters-container {
            display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
            max-width: 1400px; margin: 0 auto; padding: 0 20px 30px;
        }
        .tab {
            padding: 12px 28px; background: #1a1a1a; border-radius: 9999px;
            font-weight: 700; color: #888; cursor: pointer; transition: all 0.3s;
            border: 2px solid transparent;
        }
        .tab:hover, .tab.active {
            background: var(--accent); color: white; transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(168,85,247,0.5);
        }
        .sort-group {
            display: flex; background: #1a1a1a; border-radius: 9999px; padding: 4px;
        }
        .sort-btn {
            padding: 10px 20px; border-radius: 9999px; font-weight: 600;
            background: transparent; color: #aaa; cursor: pointer;
        }
        .sort-btn.active {
            background: var(--accent); color: white;
        }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px; max-width: 1400px; margin: 0 auto; padding: 0 20px 80px;
        }
        .card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border); transition: all 0.4s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-10px); border-color: var(--accent);
            box-shadow: 0 15px 35px rgba(168,85,247,0.25);
        }
        .card img {
            width: 100%; height: 160px; object-fit: cover;
        }
        .card-content {
            padding: 16px;
        }
        .card .cat {
            color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: 1px;
        }
        .card h3 { margin: 8px 0 4px; font-size: 1.2rem; }
        .card p { color: #999; font-size: 0.9rem; }

        /* DETAIL PAGE - SIMPLIFIED & CLEAN */
        #detailPage {
            display: none; min-height: 100vh; background: var(--bg);
        }
        .detail-header {
            padding: 40px 5% 20px; display: flex; gap: 40px; flex-wrap: wrap;
            max-width: 1300px; margin: 0 auto;
        }
        .detail-img {
            flex: 1; min-width: 300px;
        }
        .detail-img img {
            width: 100%; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .detail-info {
            flex: 1; min-width: 300px;
        }
        .detail-info .cat {
            color: var(--accent); font-weight: 700; font-size: 13px;
        }
        .detail-info h1 {
            font-size: 2.8rem; margin: 10px 0 12px; font-weight: 900;
        }
        .detail-info p {
            color: #bbb; font-size: 1.1rem;
        }

        /* Version Selector - Clean like your image */
        .version-box {
            max-width: 1300px; margin: 30px auto; padding: 0 5%;
        }
        .version-box h3 { margin-bottom: 12px; color: #ddd; }
        .version-select {
            width: 100%; padding: 16px 20px; background: #1f1f1f; border: 1px solid #444;
            border-radius: 12px; color: white; font-size: 1.1rem; margin-bottom: 16px;
        }
        .big-download-btn {
            width: 100%; padding: 18px; background: linear-gradient(90deg, #a855f7, #c026d3);
            color: white; font-size: 1.25rem; font-weight: 800; border: none;
            border-radius: 12px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px;
        }
        .big-download-btn:hover {
            transform: translateY(-4px); box-shadow: 0 10px 25px rgba(168,85,247,0.6);
        }

        .detail-sections {
            max-width: 1300px; margin: 0 auto; padding: 0 5% 80px;
        }
        .section {
            background: #121212; border-radius: 16px; padding: 24px; margin-bottom: 28px;
            border: 1px solid var(--border);
        }
        .section-title {
            font-size: 1.25rem; font-weight: 700; margin-bottom: 14px; color: #ddd;
            display: flex; align-items: center; gap: 10px;
        }
        .screenshots {
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .screenshots img {
            width: 180px; border-radius: 10px; cursor: zoom-in;
        }
        .keybinds, .changelog {
            white-space: pre-line; line-height: 1.7; color: #ccc;
        }

        /* ZOOM */
        #zoomOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center;
        }
        #zoomImg { max-width: 90%; max-height: 90%; border-radius: 16px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <!-- ADMIN TRIGGER -->
    <div onclick="checkAdmin()" style="position:fixed;bottom:10px;right:10px;width:20px;height:20px;opacity:0.05;cursor:pointer;z-index:999;"></div>

    <!-- MAIN VAULT -->
    <div id="content-wrapper">
        <nav class="nav">
            <div class="nav-logo">R3MU VAULT</div>
            <div class="nav-right">
                <div class="live-counter">
                    <span style="color:#a855f7;">●</span> LIVE • <span id="cheatCount">2</span> CHEATS
                </div>
                <a href="https://www.youtube.com/@r3mu2" target="_blank" class="social-icon" style="color:#FF0000;"><i class="fab fa-youtube"></i></a>
                <a href="https://discord.com/invite/r3musblackmarket" target="_blank" class="social-icon" style="color:#5865F2;"><i class="fab fa-discord"></i></a>
            </div>
        </nav>

        <div class="hero">
            <h1 class="hero-title">PREMIUM VAULT</h1>
            <p class="hero-sub">Elite Minecraft Archive by R3MU</p>
            <input type="text" id="searchBar" class="search-bar" placeholder="Search clients, mods, keybinds..." onkeyup="search()">
        </div>

        <div class="filters-container">
            <div class="tab active" onclick="filter('all', this)">ALL</div>
            <div class="tab" onclick="filter('clients', this)">CLIENTS</div>
            <div class="tab" onclick="filter('mods / macros', this)">MODS / MACROS</div>
            <div class="tab" onclick="filter('source codes', this)">SOURCE CODES</div>
            <div class="tab" onclick="filter('shop', this)" style="color:#fbbf24;">💰 SHOP</div>

            <div class="sort-group">
                <div class="sort-btn active" onclick="setSort(this, 'all')">All</div>
                <div class="sort-btn" onclick="setSort(this, 'newest')">Newest</div>
                <div class="sort-btn" onclick="setSort(this, 'most-viewed')">Most Viewed</div>
                <div class="sort-btn" onclick="setSort(this, 'most-downloaded')">Most Downloaded</div>
            </div>
        </div>

        <div class="grid" id="mainGrid"></div>
    </div>

    <!-- DETAIL PAGE -->
    <div id="detailPage">
        <nav class="nav">
            <div class="nav-logo">R3MU VAULT</div>
            <div class="nav-right">
                <a onclick="backToVault()" style="color:#fff; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px;">
                    ← BACK TO VAULT
                </a>
            </div>
        </nav>

        <div class="detail-header">
            <div class="detail-img">
                <img id="detailImg" src="" onclick="zoomImg(this.src)">
            </div>
            <div class="detail-info">
                <div id="detailCat" class="cat"></div>
                <h1 id="detailTitle"></h1>
                <p id="detailDesc"></p>
            </div>
        </div>

        <!-- Version Selector -->
        <div class="version-box">
            <h3>Choose Version & Download</h3>
            <select id="versionSelect" class="version-select" onchange="updateDownloadBtn()"></select>
            <button id="bigDownloadBtn" class="big-download-btn" onclick="downloadCurrentVersion()">
                <span id="selectedVersion">1.21</span> • Download Now
            </button>
        </div>

        <div class="detail-sections">
            <!-- Screenshots -->
            <div class="section">
                <div class="section-title"><i class="fas fa-images"></i> SCREENSHOTS</div>
                <div id="detailScreenshots" class="screenshots"></div>
            </div>

            <!-- Loader -->
            <div class="section">
                <div class="section-title"><i class="fas fa-cube"></i> LOADER / INSTALLATION</div>
                <div id="detailLoader" style="color:#ccc;"></div>
            </div>

            <!-- Keybinds -->
            <div class="section">
                <div class="section-title"><i class="fas fa-keyboard"></i> KEYBINDS</div>
                <div id="detailKeybinds" class="keybinds"></div>
            </div>

            <!-- What's New -->
            <div class="section">
                <div class="section-title"><i class="fas fa-star"></i> WHAT'S NEW</div>
                <div id="detailChangelog" class="changelog"></div>
            </div>
        </div>
    </div>

    <!-- Zoom Overlay -->
    <div id="zoomOverlay" onclick="this.style.display='none'">
        <img id="zoomImg" src="">
    </div>

    <script>
        particlesJS("particles-js", {
            particles: {
                number: { value: 90 },
                color: { value: "#a855f7" },
                shape: { type: "circle" },
                opacity: { value: 0.6 },
                size: { value: 3 },
                line_linked: { enable: true, distance: 150, color: "#c026d3", opacity: 0.3, width: 1 },
                move: { enable: true, speed: 1.5 }
            }
        });

        const items = [ /* same as before - you can add more */ 
            {
                slug: "cw-hack-client", name: "Cw Hack Client", cat: "clients",
                img: "https://i.postimg.cc/dtJfGxjM/2.png",
                desc: "Best CPVP Hack Client",
                loader: "Fabric Loader • 1.17x - 1.18x\nPlace in mods folder",
                keybinds: "Right Shift - Open Menu\nLeft Ctrl + K - Toggle Features",
                changelog: "• Fixed crashes\n• Added new reach\n• Better performance",
                versions: [
                    {ver: "1.17x", link: "https://shrinkme.click/9Kz0O"},
                    {ver: "1.18x", link: "https://shrinkme.click/md3Y"}
                ],
                screenshots: ["https://i.postimg.cc/dtJfGxjM/2.png", "https://picsum.photos/id/1015/800/500"]
            },
            {
                slug: "gardenia-client", name: "Gardenia Client", cat: "clients",
                img: "https://i.postimg.cc/4xWnXqBg/image.png",
                desc: "Best High Ping Client",
                loader: "Fabric Loader • 1.21\nOptimized for high ping",
                keybinds: "Right Shift - Open GUI\nF8 - Toggle modules",
                changelog: "• New high-ping optimizer\n• Fixed memory leak\n• 1.21.4 support",
                versions: [{ver: "1.21", link: "https://shrinkme.click/bUCrhByx"}],
                screenshots: ["https://i.postimg.cc/4xWnXqBg/image.png", "https://picsum.photos/id/201/800/500"]
            }
        ];

        let currentCat = 'all';

        function renderGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            let filtered = currentCat === 'all' ? items : items.filter(i => i.cat === currentCat);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.img}">
                    <div class="card-content">
                        <div class="cat">${item.cat.toUpperCase()}</div>
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                    </div>
                `;
                card.onclick = () => openDetail(item.slug);
                grid.appendChild(card);
            });
            document.getElementById('cheatCount').innerText = items.length;
        }

        function filter(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderGrid();
        }

        function setSort(btn, type) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // You can add sorting logic later if needed
            renderGrid();
        }

        function openDetail(slug) {
            const item = items.find(i => i.slug === slug);
            if (!item) return;

            document.getElementById('content-wrapper').style.display = 'none';
            document.getElementById('detailPage').style.display = 'block';

            document.getElementById('detailImg').src = item.img;
            document.getElementById('detailCat').innerText = item.cat.toUpperCase();
            document.getElementById('detailTitle').innerText = item.name;
            document.getElementById('detailDesc').innerText = item.desc;
            document.getElementById('detailLoader').innerHTML = `<p style="white-space:pre-line;">${item.loader}</p>`;
            document.getElementById('detailKeybinds').innerHTML = `<p style="white-space:pre-line;">${item.keybinds}</p>`;
            document.getElementById('detailChangelog').innerHTML = `<p style="white-space:pre-line;">${item.changelog}</p>`;

            // Version dropdown
            const select = document.getElementById('versionSelect');
            select.innerHTML = '';
            item.versions.forEach((v, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = v.ver;
                select.appendChild(opt);
            });
            updateDownloadBtn();
        }

        function updateDownloadBtn() {
            const itemSlug = /* you can improve this later */;
            const select = document.getElementById('versionSelect');
            document.getElementById('selectedVersion').innerText = select.options[select.selectedIndex].text;
        }

        function downloadCurrentVersion() {
            const select = document.getElementById('versionSelect');
            const item = items.find(i => document.getElementById('detailTitle').innerText === i.name);
            if (item) {
                const idx = parseInt(select.value);
                window.open(item.versions[idx].link, '_blank');
            }
        }

        function backToVault() {
            document.getElementById('detailPage').style.display = 'none';
            document.getElementById('content-wrapper').style.display = 'block';
        }

        function zoomImg(src) {
            document.getElementById('zoomImg').src = src;
            document.getElementById('zoomOverlay').style.display = 'flex';
        }

        function checkAdmin() {
            if (prompt("Enter NIMDO Password:") === "pookie123") {
                alert("Admin panel coming in next update!");
            }
        }

        function search() {
            // Basic search
            renderGrid();
        }

        window.onload = () => {
            renderGrid();
        };
    </script>
</body>
</html>
