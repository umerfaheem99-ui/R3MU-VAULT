<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R3MU VAULT | Premium Minecraft Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<style>
/* ── ALL ORIGINAL STYLES PRESERVED ── */
:root { --bg: #060608; --accent: #7c3aed; --accent2: #a855f7; --card-bg: #0e0e12; --text: #e8e8f0; --muted: #5a5a72; --border: #1c1c28; --yt: #FF0000; --dc: #5865F2; --grad: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899); }
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; font-size: 14px; }
#particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none; }
#content-wrapper, #detailPage { position: relative; z-index: 2; }

/* ── NAV & LOGO ── */
.nav { display: flex; justify-content: space-between; align-items: center; padding: 0 4%; height: 52px; background: rgba(6,6,8,0.96); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
.nav-logo { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.25rem; letter-spacing: 2px; text-transform: uppercase; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; cursor: pointer; padding: 6px 14px; border: 1px solid rgba(124,58,237,0.35); border-radius: 8px; transition: all 0.25s ease; user-select: none; }

/* ── NEW FEATURE STYLES (ADDED WITHOUT BREAKING) ── */
.news-btn { background: var(--grad); border: none; padding: 6px 12px; border-radius: 6px; color: white; font-weight: 700; cursor: pointer; margin-right: 10px; font-size: 11px; font-family: 'Rajdhani'; letter-spacing: 1px; }
#newsBanner { display: none; background: rgba(124, 58, 237, 0.05); border: 1px dashed var(--accent); padding: 8px; margin: 10px auto; max-width: 90%; border-radius: 8px; text-align: center; }
.booster-locked { color: #f472b6 !important; position: relative; }

/* ── ORIGINAL GRID & CARDS ── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; max-width: 1300px; margin: 0 auto; padding: 16px 16px 60px; }
.card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 10px; transition: 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
.card:hover { transform: translateY(-6px); border-color: rgba(124,58,237,0.5); box-shadow: 0 10px 28px rgba(124,58,237,0.15); }
.card img { width: 100%; border-radius: 8px; height: 110px; object-fit: cover; margin-bottom: 9px; }

/* ── ADMIN AREA ── */
#nimdoArea { display: none; padding: 30px 16px; min-height: 100vh; background: #050505; position: fixed; inset: 0; z-index: 5000; overflow-y: auto; }
.nimdo-card { background: #0a0a10; max-width: 580px; margin: 0 auto; padding: 28px; border-radius: 16px; border: 2px solid var(--accent); }
</style>
</head>
<body>
<div id="particles-js"></div>

<div id="nimdoArea">
    <div class="nimdo-card">
        <h2 style="color:var(--accent2); text-align:center; font-family:'Rajdhani';">NIMDO ADMIN v2</h2>
        <input type="text" id="nNewsInput" class="nimdo-in" placeholder="Update What's New Text...">
        <button onclick="updateMarquee()" class="admin-btn-sm">Update Banner</button>
        <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
        <button onclick="exitAdmin()" class="admin-btn-sm">Exit Admin</button>
    </div>
</div>

<div id="content-wrapper">
    <nav class="nav">
        <div class="nav-logo" id="adminTrigger">R3MU VAULT</div>
        <div class="nav-links">
            <button class="news-btn" onclick="toggleNews()"><i class="fas fa-bullhorn"></i> UPDATES</button>
            <div class="cheat-counter"><div class="live-dot"></div>LIVE • <span id="cheatCount">0</span> CHEATS</div>
            <a href="#" class="social-icon dc"><i class="fab fa-discord"></i></a>
        </div>
    </nav>

    <div id="newsBanner">
        <marquee id="updateText" style="font-weight: 600; font-size: 13px; color: var(--accent2);">
            Welcome to R3MU Vault! New clients added daily.
        </marquee>
    </div>

    <div class="hero">
        <h1 class="hero-title">PREMIUM VAULT</h1>
        <p class="hero-sub">Elite Minecraft archive • Clean • Shareable • Professional</p>
        <input type="text" id="searchBar" class="search-bar" placeholder="Search..." oninput="doSearch()">
    </div>

    <div class="filter-row" id="catTabs">
        <div class="tab active" onclick="filterCat('all',this)">ALL</div>
        <div class="tab" onclick="filterCat('clients',this)">CLIENTS</div>
        <div class="tab booster-locked" onclick="checkBoosterAuth()">💎 BOOSTER</div>
        <div class="tab shop-tab" onclick="filterCat('shop',this)">💰 SHOP</div>
    </div>

    <div class="grid" id="mainGrid"></div>
</div>

<script>
// INITIALIZE PARTICLES (Original Settings)
particlesJS("particles-js",{particles:{number:{value:55},color:{value:"#7c3aed"},opacity:{value:0.45},size:{value:2},line_linked:{enable:true,distance:140,color:"#7c3aed",opacity:0.18,width:1},move:{enable:true,speed:1.4}}});

// DATA & RENDER LOGIC (Original preserved)
const items = [ /* Your Items here */ ];

function toggleNews() {
    const banner = document.getElementById('newsBanner');
    banner.style.display = (banner.style.display === 'block') ? 'none' : 'block';
}

function checkBoosterAuth() {
    alert("Connect Discord to verify Server Boost status! (Feature coming soon)");
}

// URL ADMIN ACCESS (?page=admin)
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('page') === 'admin') {
    document.getElementById('nimdoArea').style.display = 'block';
    document.getElementById('content-wrapper').style.display = 'none';
}

function updateMarquee() {
    document.getElementById('updateText').innerText = document.getElementById('nNewsInput').value;
    alert("Banner Updated!");
}

function exitAdmin() { location.href = window.location.pathname; }

// Add original renderGrid() and filterCat() functions from index.html here...
</script>
</body>
</html>
