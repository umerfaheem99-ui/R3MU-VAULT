<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3MU VAULT | Premium Minecraft Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #8147ff; --card-bg: #0d0d0d; --text: #eee; --border: #1a1a1a; --yt: #FF0000; --dc: #5865F2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #content-wrapper { position: relative; z-index: 2; }

        .nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .nav-logo { font-weight: 900; font-size: 1.8rem; color: #fff; letter-spacing: -1px; }

        .nav-links a { font-size: 1.5rem; transition: 0.3s; }
        .nav-links a:hover { transform: scale(1.2); opacity: 0.8; }

        .hero { padding: 80px 20px 20px; text-align: center; }
        .hero-title { font-size: 3.5rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        .hero-sub { color: #888; font-size: 1.1rem; margin: 10px 0 40px; font-weight: 600; }

        .search-bar { width: 100%; max-width: 650px; padding: 18px 25px; background: rgba(15,15,15,0.9); border: 1px solid var(--border); border-radius: 15px; color: white; font-size: 1rem; outline: none; margin-bottom: 50px; display: block; margin-left: auto; margin-right: auto; }

        .tabs { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px; }
        .tab { padding: 12px 24px; background: #111; border-radius: 12px; font-weight: 800; color: #555; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; }
        .tab:hover { color: var(--accent); border-color: var(--accent); }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }
        .card { background: rgba(13,13,13,0.8); border-radius: 20px; border: 1px solid var(--border); padding: 22px; transition: 0.4s; cursor: pointer; display: block; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(129,71,255,0.2); }
        .card img { width: 100%; border-radius: 14px; height: 180px; object-fit: cover; margin-bottom: 18px; }

        /* MODAL FIX: Image now shows full GUI without cutting */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .m-content { background: #0a0a0a; padding: 40px; border-radius: 25px; max-width: 550px; width: 100%; max-height: 85vh; overflow-y: auto; border: 1px solid #222; text-align: center; }
        .m-img { width: 100%; border-radius: 15px; margin-bottom: 20px; height: auto; max-height: 300px; object-fit: contain; background: #000; }
        
        .m-content::-webkit-scrollbar { width: 5px; }
        .m-content::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .dl-btn { display: flex; justify-content: space-between; padding: 16px 20px; background: #151515; color: #fff; text-decoration: none; border-radius: 12px; font-weight: 800; margin-top: 12px; border: 1px solid #222; transition: 0.3s; }
        .dl-btn:hover { background: var(--accent); }

        #nimdoArea { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 2000; overflow-y: auto; padding: 50px 20px; }
        .nimdo-card { background: #0d0d0d; max-width: 600px; margin: 0 auto; padding: 40px; border-radius: 30px; border: 1px solid var(--accent); }
        .nimdo-in { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div id="content-wrapper">
        <nav class="nav">
            <div class="nav-logo">R3MU VAULT</div>
            <div class="nav-links">
                <a href="https://www.youtube.com/@r3mu2" target="_blank" style="color:var(--yt); margin-right:20px;"><i class="fab fa-youtube"></i></a>
                <a href="https://discord.com/invite/r3musblackmarket" target="_blank" style="color:var(--dc);"><i class="fab fa-discord"></i></a>
            </div>
        </nav>

        <div id="vaultContent">
            <div class="hero">
                <h1 class="hero-title">PREMIUM VAULT</h1>
                <p class="hero-sub">The ultimate archive. Crafted for eliteness.</p>
                <input type="text" id="searchBar" class="search-bar" placeholder="Search for clients, mods, or sources..." onkeyup="search()">
            </div>

            <div class="tabs">
                <div class="tab active" onclick="filter('all', this)">ALL</div>
                <div class="tab" onclick="filter('clients', this)">CLIENTS</div>
                <div class="tab" onclick="filter('mods', this)">MODS / MACROS</div>
                <div class="tab" onclick="filter('source', this)">SOURCE CODES</div>
                <div class="tab" onclick="filter('shop', this)" style="color: gold;">💰 SHOP</div>
            </div>

            <div class="grid" id="mainGrid">
                <div class="card" data-cat="clients" onclick="openItem('Gardenia Client','https://media.discordapp.net/attachments/1466198923277369464/1466199335929905324/image.png?ex=69c65cca&is=69c50b4a&hm=025377816c926eb151c07181936244c222199817823145a81db58fed5151d0c3&=&format=webp&quality=lossless&width=1463&height=822','1.21','https://shrinkme.click/bUCrhByx','clients','S2V5YmluZCA6IFJpZ2h0IFNoaWZ0')">
                    <img src="https://media.discordapp.net/attachments/1466198923277369464/1466199335929905324/image.png?ex=69c65cca&is=69c50b4a&hm=025377816c926eb151c07181936244c222199817823145a81db58fed5151d0c3&=&format=webp&quality=lossless&width=1463&height=822">
                    <div style="color:var(--accent); font-weight:900; font-size:11px;">CLIENTS</div>
                    <h3>Gardenia Client</h3>
                    <p>Keybind : Right Shift...</p>
                </div>

                <div class="card" data-cat="shop" onclick="openItem('CustomClient','https://media.discordapp.net/attachments/1485819883538354206/1485932090649219072/image.png','ALL Versions','https://discord.gg/aFnv9JMX5Y','shop','T3JkZXIgeW91ciBjdXN0b20gYnVpbHQgY2xpZW50IGZvciBtYXhpbXVtIHBlcmZvcm1hbmNl')">
                    <img src="https://media.discordapp.net/attachments/1485819883538354206/1485932090649219072/image.png">
                    <div style="color:var(--accent); font-weight:900; font-size:11px;">SHOP</div>
                    <h3>CustomClient</h3>
                    <p>Order your custom built client for maximum performance...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" onclick="closeM(event)">
        <div class="m-content" onclick="event.stopPropagation()">
            <img id="mImg" class="m-img" src="">
            <h2 id="mTitle" style="font-size:28px; margin:0; font-weight:900;"></h2>
            <p id="mDesc" style="color:#888; margin:20px 0; font-weight:600;"></p>
            <div id="mLinks"></div>
        </div>
    </div>

    <script>
        particlesJS("particles-js", { "particles": { "number": { "value": 100 }, "size": { "value": 3 }, "color": { "value": "#8147ff" }, "line_linked": { "enable": true, "distance": 150, "color": "#8147ff", "opacity": 0.35 }, "move": { "speed": 2.5 } } });

        if (window.location.search.includes('nimda')) {
            if (prompt("NIMDO Password:") === "pookie123") {
                document.getElementById('nimdoArea').style.display = 'block';
                document.getElementById('content-wrapper').style.display = 'none';
            }
        }

        function search() {
            let q = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
            });
        }

        function filter(cat, el) {
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = (cat === 'all' || c.getAttribute('data-cat') === cat) ? "block" : "none";
            });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function openItem(name, img, versions, links, cat, descB64) {
            document.getElementById('mTitle').innerText = name;
            document.getElementById('mImg').src = img;
            document.getElementById('mDesc').innerText = descB64 ? atob(descB64) : "";
            let vArr = versions.split('|'), lArr = links.split('|'), h = '';
            let btnTxt = (cat === 'shop') ? "Order At Discord" : "Download Now";
            vArr.forEach((v, i) => { h += `<a href="${lArr[i]}" class="dl-btn" target="_blank"><span>${v} | ${btnTxt}</span> <i class="fas fa-chevron-right"></i></a>`; });
            document.getElementById('mLinks').innerHTML = h;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeM(e) { if(!e || e.target.id === 'modal') document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
