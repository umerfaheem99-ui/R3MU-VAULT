<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3MU VAULT | Official Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #8147ff; --card-bg: #0d0d0d; --text: #eee; --border: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Navbar like Cyde.xyz */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .nav-logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; font-weight: 600; transition: 0.3s; font-size: 0.9rem; }
        .nav-links a:hover { color: var(--accent); }

        /* Hero & Search bar */
        .hero { padding: 80px 20px 40px; text-align: center; }
        .hero h1 { font-size: 4.5rem; font-weight: 900; margin: 0; letter-spacing: -3px; text-transform: uppercase; }
        .search-container { max-width: 600px; margin: 40px auto; position: relative; }
        .search-bar { width: 100%; padding: 18px 25px; background: #111; border: 1px solid var(--border); border-radius: 15px; color: white; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(129,71,255,0.2); }

        /* Categories Tabs */
        .tabs { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px; }
        .tab { padding: 10px 20px; background: #111; border-radius: 10px; font-weight: 700; color: #666; cursor: pointer; transition: 0.3s; font-size: 13px; text-transform: uppercase; border: 1px solid var(--border); }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); padding: 20px; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; border-radius: 12px; height: 170px; object-fit: cover; margin-bottom: 15px; }
        .card-cat { color: var(--accent); font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .card h3 { margin: 5px 0; font-size: 20px; }
        .card p { font-size: 13px; color: #777; line-height: 1.5; }

        /* Admin & Modal Styles */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .m-content { background: #0f0f0f; padding: 35px; border-radius: 25px; max-width: 500px; width: 90%; border: 1px solid #222; }
        .dl-btn { display: block; background: var(--accent); color: white; padding: 15px; text-align: center; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; }

        #nimdoArea { display: none; padding: 50px 20px; max-width: 800px; margin: 0 auto; }
        .nimdo-in { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; color: white; border: 1px solid #333; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-logo">ʀ3ᴍᴜ ᴠᴀᴜʟᴛ</div>
        <div class="nav-links">
            <a href="https://youtube.com/@pookie" target="_blank">YOUTUBE</a>
            <a href="https://discord.gg/yourlink" target="_blank">DISCORD</a>
        </div>
    </nav>

    <div id="vaultContent">
        <div class="hero">
            <h1>VAULT ARCHIVE</h1>
            <div class="search-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="Search for clients, mods, or bypasses..." onkeyup="search()">
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="filter('all', this)">ALL</div>
            <div class="tab" onclick="filter('clients', this)">CLIENTS</div>
            <div class="tab" onclick="filter('mods', this)">MODS/MACROS</div>
            <div class="tab" onclick="filter('pvp', this)">PVP OPTIMIZERS</div>
            <div class="tab" onclick="filter('source', this)">SOURCE CODES</div>
            <div class="tab" onclick="filter('bypass', this)">BYPASSES</div>
        </div>

        <div class="grid" id="mainGrid">
            <div class="card" data-cat="clients" onclick="openItem('Custom Clients','https://media.discordapp.net/attachments/1485819883538354206/1485932090649219072/image.png','ALL','https://discord.gg/yourlink','Clients','UFJJQ0lORzogJDEgUGVyIE1vZHVsZSwgKyQ0IE1vZCBBbmFseXplciBCeXBhc3MsICskMTAgT2NlYW4gQnlwYXNzLCArJDE1IEFsbCBTUyBUb29scyBCeXBhc3M=')">
                <img src="https://media.discordapp.net/attachments/1485819883538354206/1485932090649219072/image.png">
                <div class="card-cat">Clients</div>
                <h3>Custom Clients</h3>
                <p>Pricing: $1 Per Module, $4 Mod Analyzer Bypass...</p>
            </div>
        </div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="m-content" onclick="event.stopPropagation()">
            <h2 id="mTitle" style="font-size:30px; margin:0;"></h2>
            <p id="mDesc" style="color:#aaa; margin:20px 0; line-height:1.6;"></p>
            <div id="mLinks"></div>
        </div>
    </div>

    <div id="nimdoArea">
        <h1 style="color:var(--accent); font-weight:900;">NIMDO CONSOLE</h1>
        <select id="nCat" class="nimdo-in">
            <option value="clients">Clients</option>
            <option value="mods">Mods/Macros</option>
            <option value="pvp">PvP Optimizers</option>
            <option value="source">Source Codes</option>
            <option value="bypass">Bypasses</option>
        </select>
        <input type="text" id="nName" class="nimdo-in" placeholder="Name">
        <input type="text" id="nImg" class="nimdo-in" placeholder="Image Link">
        <textarea id="nDesc" class="nimdo-in" placeholder="Description" style="height:100px;"></textarea>
        <input type="text" id="nVer" class="nimdo-in" placeholder="Version">
        <input type="text" id="nLink" class="nimdo-in" placeholder="Link">
        <button onclick="genItem()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer;">GENERATE CODE</button>
    </div>

    <script>
        // NIMDO Access
        if (window.location.search.includes('nimda')) {
            if (prompt("Enter NIMDO Key:") === "pookie123") {
                document.getElementById('nimdoArea').style.display = 'block';
                document.getElementById('vaultContent').style.display = 'none';
                document.querySelector('.nav').style.display = 'none';
            }
        }

        function search() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
            }
        }

        function filter(cat, el) {
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                card.style.display = (cat === 'all' || card.dataset.cat === cat) ? "block" : "none";
            }
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function openItem(name, img, ver, link, cat, descBase64) {
            document.getElementById('mTitle').innerText = name;
            document.getElementById('mDesc').innerText = atob(descBase64);
            document.getElementById('mLinks').innerHTML = `<a href="${link}" class="dl-btn" target="_blank">GET / DOWNLOAD (${ver})</a>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function genItem() {
            const n = document.getElementById('nName').value;
            const c = document.getElementById('nCat').value;
            const i = document.getElementById('nImg').value;
            const d = document.getElementById('nDesc').value;
            const v = document.getElementById('nVer').value;
            const l = document.getElementById('nLink').value;
            const code = `<div class="card" data-cat="${c}" onclick="openItem('${n}','${i}','${v}','${l}','${c}','${btoa(d)}')"><img src="${i}"><div class="card-cat">${c}</div><h3>${n}</h3><p>${d.substring(0,40)}...</p></div>`;
            navigator.clipboard.writeText(code);
            alert("Code Copied! Now paste it inside the 'grid' div.");
        }
    </script>
</body>
</html>
